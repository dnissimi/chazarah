  en: "When the blood of slaughter renders meat susceptible to impurity and why impure hands do not disqualify non-sacred food; first-degree hands per Rabbi Shimon ben Elazar; and non-sacred food prepared at sacred purity in the R. Eliezer–R. Yehoshua dispute."
