title:
  he: "מפת הסוגיא — חולין ע״ג"
  en: "Sugya map — Chullin 73"
blurb:
  he: "האם שחיטת האם מטהרת אבר העובר שיצא מטומאת נבלה? מחלוקת ר׳ מאיר וחכמים, ומחלוקת ר׳ יוחנן וריש לקיש אם דין זה שווה באבר בהמה המדולדל; ומסקנה: מיתה עושה ניפול, שחיטה אינה עושה ניפול."
  en: "Does the mother's slaughter shield a fetal limb that emerged from carcass impurity? R. Meir vs. the Rabbis, and R. Yoḥanan vs. Reish Lakish on whether the same applies to a hanging limb; the upshot: death makes a limb 'fallen,' slaughter does not."
topic:
  he: "שחיטה מטהרת אבר עובר ואבר מדולדל"
  en: "Slaughter purifying a fetal or hanging limb"
