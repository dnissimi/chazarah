title:
  he: "מפת הסוגיא — חולין מ״ז"
  en: "Sugya map — Chullin 47"
blurb:
  he: "סימני טריפות הריאה: חמש אונות וסדרן (וחריגות שהוכשרו), מראות הריאה — ככוחלא ועד ככבדא וירוקה־כשרה, בדיקת ריאה אטומה וריאה דאוושׁא בנוצה וברוק, וריאה שנשפכה כקיתון כשרה — שחיסרון מבפנים אינו שמיה חיסרון, ובלבד שהסמפונות קיימים."
  en: "Signs of a tereifa lung: the five lobes and their order (with deviations that were nonetheless deemed kosher); the lung's colors — from eye-shadow dark to liver-like and kosher green; testing a sealed or sound-emitting lung with a feather and saliva; and a lung that liquefied like water from a jug, which is kosher — for a deficiency on the inside is no deficiency, provided the bronchi remain intact."
topic:
  he: "טריפות הריאה — מראות וצורות"
  en: "Tereifot of the lung"
