title:
  he: "מפת הסוגיא — חולין נ״ה"
  en: "Sugya map — Chullin 55"
blurb:
  he: "המשנה מנתה אברים שניטלו והבהמה כשרה; הגמרא מסייגת: ניקוב הטחול והכליה, ריאה שצמקה בידי אדם, וגלודה שלא נשתייר בה כסלע — טריפה."
  en: "The Mishna lists organs whose removal leaves the animal kosher; the Gemara qualifies: a perforated spleen or kidney, a lung shriveled by man, and a flayed animal with no patch of hide left — treifa."
