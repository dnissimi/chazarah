blurb:
  he: "הסנונית הלבנה כשרה לטהרת מצורע, ונחלקו אם המחלוקת בלבנת־כרס או צהובת־כרס; ואז סדרה ארוכה של זיהויי עופות — סימני טהרה, שמונה ספקות, וסימני־זכירה לכשר ולאסור."
  en: "The white senunit is kosher for a leper's purification; whether the dispute is over the white- or yellow-bellied kind is itself disputed. Then a long run of bird identifications — signs of kashrut, eight doubtful cases, and mnemonics for permitted vs forbidden."
