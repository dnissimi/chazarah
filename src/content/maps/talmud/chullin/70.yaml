blurb:
  he: "בעיות רבא ביציאת העובר ובמה ׳פוטר את הרחם׳ לבכורה — רובן בתיקו; ומשנת ׳שמת עוברה׳ — שעובר מת שבמעי אמו טהור, ומחלוקת ר׳ יוסי הגלילי וחכמים בבהמה טמאה."
  en: "Rava’s dilemmas on the fetus’s emergence and what counts as ‘opening the womb’ for firstborn status — mostly left unresolved; and the Mishna that a dead fetus in the womb is pure, with R. Yosei HaGelili dissenting for a non-kosher animal."
