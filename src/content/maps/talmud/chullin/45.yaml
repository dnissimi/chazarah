title:
  he: "מפת הסוגיא — חולין מ״ה"
  en: "Sugya map — Chullin 45"
blurb:
  he: "המשך מניין הטריפות בקנה, בקרום המוח, בלב ובחוט השדרה: צירוף נקבים לכאיסר או לרוב, מקום הכשר לשחיטה, גבול המוח וחוט השדרה, נקב הלב והקנה, פסיקת חוט השדרה ברובו, נתמרך ונתמסמס, ועד היכן מגיע חוט השדרה."
  en: "The enumeration of tereifot continues through the windpipe, the membrane of the brain, the heart, and the spinal cord: how holes join to an issar or to a majority, where on the neck slaughter is valid, the boundary of brain and cord, the perforated heart and aorta, a cord cut in its majority, liquefied and softened cords, and how far down the spinal cord extends."
topic:
  he: "טריפות הקנה והשדרה"
  en: "Tereifot of windpipe and spine"
