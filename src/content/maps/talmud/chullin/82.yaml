blurb:
  he: "הקודם בקנייה קודם בשחיטה — אך אם קדם השני, זריז ונשכר; ׳לא תשחטו׳ אוסר שני הסדרים; ומחלוקת סומכוס וחכמים אם פגיעה כפולה בהעלם אחד מחייבת כפול."
  en: "The earlier buyer slaughters first—but if the second preceded, he is diligent and rewarded; ‘you shall not slaughter’ forbids both orders; and Sumakhos vs. the Rabbis on a doubled violation in one lapse."
