title:
  he: "מפת הסוגיא — חולין ע״ז"
  en: "Sugya map — Chullin 77"
blurb:
  he: "שליא שבבהמה שחוטה הותרה בשחיטת אמהּ ואינה מטמאה; דקדוק מקורהּ; ספק עור חמור ששלקו; מחלוקת אם חוששין לולד אחר; טעמי המבכרת והמוקדשין; וכלל דרכי האמורי — כל שיש בו רפואה מותר."
  en: "A placenta in a slaughtered animal is permitted by the mother’s slaughter and conveys no impurity; the source is examined; a dilemma on cooked donkey-hide; a dispute over fear of a second fetus; the reasons for the firstborn and sacrificial rulings; and the rule of Amorite ways — anything with a remedy is allowed."
topic:
