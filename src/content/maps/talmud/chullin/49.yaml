title:
  he: "מפת הסוגיא — חולין מ״ט"
  en: "Sugya map — Chullin 49"
blurb:
  he: "המשך דיני טריפות הריאה — ״ריאה״ שמאירה את העיניים, תליית נקב בטבח ובזאב, ומחלוקת ר׳ שמעון בנקיבת הסמפון; ודיני חלב הקיבה — אם כוהנים נהגו בו היתר, מחלוקת ר׳ ישמעאל ור׳ עקיבא, ואם חלב סותם את הנקב, חימצא ובר חימצא."
  en: "More lung-tereifa laws — the lung that 'lights up the eyes', attributing a perforation to the butcher or a wolf, and Rabbi Shimon's dispute on perforation to the bronchus; then the fat on the abomasum — whether the priests permitted it, the Rabbi Yishmael–Rabbi Akiva dispute, whether fat seals a perforation, and ḥimtza versus bar ḥimtza."
topic:
  he: "חלב הקיבה וטריפות הריאה"
  en: "Abomasum fat and lung tereifot"
