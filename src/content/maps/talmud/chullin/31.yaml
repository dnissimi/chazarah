title:
  he: "מפת הסוגיא — חולין ל״א"
  en: "Sugya map — Chullin 31"
blurb:
  he: "מאיזה אורך סכין מותר להתיז, באילו כלים שוחטים, ודין נפלה סכין — שממנו לומדת הגמרא שאין צורך בכוונה לשחיטת חולין, ומשם לנדה שנאנסה וטבלה שלא בכוונה."
  en: "How long a knife must be to decapitate, which implements may slaughter, and the case of a knife that fell — from which the Gemara derives that slaughter of non-sacred animals needs no intent, leading to a woman who immersed without intent."
topic:
