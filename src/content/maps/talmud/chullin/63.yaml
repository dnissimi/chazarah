blurb:
  he: "כ״ד עופות טמאים נדרשים מן ׳למינה׳; עוף טהור נאכל במסורת מצייד הבקי; וביצי נכרי כשרות אלא בטרופות בקערה — וסימני הביצה אינם מן התורה."
  en: "Twenty-four non-kosher birds are derived from ‘after its kinds’; a kosher bird is eaten on a hunter’s tradition; gentile eggs are permitted except when beaten in a bowl — and the egg-signs are not Torah-binding."
