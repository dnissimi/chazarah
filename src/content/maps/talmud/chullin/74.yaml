title:
  he: "מפת הסוגיא — חולין ע״ד"
  en: "Sugya map — Chullin 74"
blurb:
  he: "מיתה עושה ניפול ואין שחיטה עושה ניפול; ובבן פקועה — אם ׳שחיטת אמו מטהרתו׳ — תלויים דיני חֵלב, דם, פדיון פטר חמור, וטומאה."
  en: "Death renders a limb fallen-off, slaughter does not; and on whether a fetus is permitted by its mother’s slaughter hinge its fat, blood, donkey-redemption, and impurity."
topic:
