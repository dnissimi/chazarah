blurb:
  he: "שלוש משניות בתבנית ׳טהור בזה טמא בזה׳: גולמי כלי עץ ומתכת ודין כלי עצם; שלב חיוב המעשר בשקדים מרים ומתוקים; ותמד שהחמיץ — כמי נשנית המשנה."
  en: "Three mishnayot in a ׳pure here, impure there׳ pattern: unfinished wooden and metal vessels and the law of bone vessels; the tithe-obligation stage of bitter versus sweet almonds; and fermented temed — whose opinion the mishna follows."
