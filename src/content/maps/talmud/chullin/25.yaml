title:
  he: "חולין כ״ה — גולמי כלים, שקדים, ותֶמֶד"
  en: "Chullin 25 — Unfinished vessels, almonds, and temed"
blurb:
  he: "שלוש משניות וגמרתן: טומאת כלי עץ ומתכת ו״גולמי כלים״ (כלים שטרם נגמרו); שקדים מרים ומתוקים (חיוב תרומה ומעשר); והתֶּמֶד (משקה משאריות ענבים) — מאימתי נחשב יין; הסוגיה האחרונה מבררת כשיטת מי נשנתה המשנה."
  en: "Three mishnayot and their gemara: the impurity of wood and metal vessels and 'unfinished vessels' (not yet complete); bitter and sweet almonds (the duty of teruma and ma'aser); and temed (a drink from grape dregs) — from when it counts as wine; the last sugya asking whose view the mishna follows."
