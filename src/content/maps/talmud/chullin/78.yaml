blurb:
  he: "פתיחת פרק ׳אותו ואת בנו׳: היכן נוהג האיסור וטבלת המקרים; דרשות הכתוב למוקדשין, לכלאים ולחלוקת האיסורים; מחלוקת חנניה וחכמים בזכרים — והלכה כחנניה, עם החקירה אם חוששין לזרע האב."
  en: "The chapter ‘a mother and its offspring’ opens: where the prohibition applies and the table of cases; verses deriving it for sacrificial animals, diverse kinds, and the split of prohibitions; the Ḥananya–Rabbis dispute over males — and the halakha like Ḥananya, with the inquiry over paternity in mules."
