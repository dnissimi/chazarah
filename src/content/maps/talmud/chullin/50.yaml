title:
  he: "מפת הסוגיא — חולין נ׳"
  en: "Sugya map — Chullin 50"
blurb:
  he: "טרפות בבני המעיים: ליחה הסותמת נקב — להלכה הבהמה טרפה; מקיפין נקב בנקב; חלחולת במקום הדבק; מהי כרס הפנימי וכמה קרע פוסל; ומחט בבית הכוסות — קורט דם מכריע אם הנקב לפני שחיטה."
  en: "Tereifot of the innards: mucus sealing a perforated intestine — the halakha rules the animal a tereifa; comparing one perforation to another; the rectum at the place of attachment; what is the internal rumen and how large a tear disqualifies; and a needle in the reticulum — a drop of blood decides whether the perforation preceded slaughter."
