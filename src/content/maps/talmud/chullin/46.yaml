blurb:
  he: "כמה כבד צריך להישתייר וְהֵיכָן; וטריפת הריאה שניקבה — אם ניקב הקרום החיצון או הפנימי, אדמומית ויובש הריאה, ובדיקת בועות וסירכות שאין מקיפין בהן."
  en: "How much liver must remain and where; and the perforated lung — whether the outer or inner membrane was breached, reddening and drying of the lung, and inspecting cysts and adhesions that may not be compared."
