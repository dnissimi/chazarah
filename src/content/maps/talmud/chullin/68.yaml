title:
  he: "מפת הסוגיא — חולין ס״ח"
  en: "Sugya map — Chullin 68"
blurb:
  he: "עובר שהוציא אבר חוץ למחיצתו והחזירו — נאסר; רב סובר ׳יש לידה לאברים׳ והאבר אסור, ועולא משם ר׳ יוחנן מתיר; תיובתא דעולא, ושתי איבעיות במוציא ומחזיר עד רובו."
  en: "A fetal limb extended beyond its boundary and returned is forbidden; Rav holds ‘limbs have a birth’ and the limb is prohibited, while Ulla in R. Yoḥanan’s name permits it; Ulla is conclusively refuted, and two unresolved dilemmas remain."
topic:
  he: "עובר שהוציא אבר — יש לידה לאברים?"
  en: "A fetus that extended a limb"
