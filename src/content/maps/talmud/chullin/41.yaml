title:
  he: "מפת הסוגיא — חולין מ״א"
  en: "Sugya map — Chullin 41"
blurb:
  he: "אסור לשחוט באופן הנראה כעבודה זרה — לתוך ים, כלים או גומא שבשוק; והשוחט לשם קרבן הנידר ונידב — שחיטתו פסולה, שנראה כשוחט קודשים בחוץ."
  en: "One may not slaughter in a way that looks idolatrous — into a sea, vessels, or a marketplace hole; and one who slaughters for the sake of an offering that can be vowed or donated — his slaughter is invalid, for it looks like sacrificing outside the Temple."
