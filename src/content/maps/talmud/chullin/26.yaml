title:
  he: "חולין כ״ו — תֶמֶד ומשניות ״כל מקום״ (סיום הפרק)"
  en: "Chullin 26 — Temed and the 'wherever' mishnayot (end of the chapter)"
blurb:
  he: "המשך דין התֶּמֶד — אימתי הוא נחשב פרי לעניין מעשר ולטומאה — ומעבר לארבע משניות קצרות בתבנית ״כל מקום שיש X אין Y״: מֶכֶר מול קְנָס, מֵיאוּן מול חֲלִיצָה, ותְּקִיעָה מול הַבְדָּלָה. בכך מסתיים פרק ״הכל שוחטין״."
  en: "Temed continued — when it counts as fruit for tithing and impurity — then four short mishnayot in the pattern 'wherever there is X there is no Y': sale vs. fine, refusal (mi'un) vs. chalitza, and shofar-blowing vs. havdala. With this, the chapter 'HaKol Shochtin' concludes."
