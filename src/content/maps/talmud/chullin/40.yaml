title:
  he: "מפת הסוגיא — חולין מ׳"
  en: "Sugya map — Chullin 40"
blurb:
  he: "מתי שחיטה לשם דבר אחר אוסרת את הבהמה בהנאה: לְהר — פסולה בלבד, לשר ההר — זבחי מתים; ונחלקו רב הונא ורב נחמן, רב עמרם ורב יצחק אם אדם אוסר דבר שאינו שלו — וישראל אינו אוסר אלא אם כן הוא משומד."
  en: "When slaughtering for the sake of another entity renders the animal forbidden: for a mountain — merely unfit; for its angel — an offering to the dead; and Rav Huna disputes Rav Nachman, Rav Amram, and Rav Yitzchak over whether one can forbid what is not his — a Jew does not, unless he is an apostate."
topic:
