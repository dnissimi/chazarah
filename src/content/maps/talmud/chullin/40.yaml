blurb:
  he: "הגמרא מיישבת סתירה בין משנה לברייתא בשוחט להרים, ומבררת אם השוחט בהמת חברו לעבודה זרה אוסרהּ — מחלוקת רב הונא והכלל ׳אין אדם אוסר דבר שאינו שלו׳, מקושיות וישובים עד החילוק בין גוי לישראל מומר."
  en: "The Gemara reconciles a contradiction between the Mishnah and a baraita on slaughtering for mountains, then asks whether one who slaughters another׳s animal for idolatry renders it forbidden — Rav Huna versus the rule that a person cannot forbid what is not his — through objections and answers down to the distinction between a gentile and an apostate Jew."
topic:
  he: "אוסר דבר שאינו שלו לעבודה זרה"
  en: "Forbidding another׳s animal by idolatry"
