blurb:
  he: "ארבעה פרקים שחייב המוכר להודיע, ושאלת הקניין בכפיית הטבח; ׳יום אחד׳ נלמד מבראשית — היום אחר הלילה; סיום הפרק, ופתיחת ׳כיסוי הדם׳ עם הדיון מדוע אין מכסים דם עוף מוקדש."
  en: "Four times a seller must warn, and the acquisition puzzle in compelling the butcher; ‘one day’ derived from Creation — the day follows the night; the chapter closes, and ‘covering the blood’ opens with why a sacrificial bird’s blood is not covered."
