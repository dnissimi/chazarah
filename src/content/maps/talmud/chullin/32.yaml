blurb:
  he: "מתי הפסקה באמצע השחיטה פוסלת — ׳כדי שחיטה׳ ו׳כדי ביקור׳; חיתוך הסימנים שלא כסדר — נבילה או טריפה; ודין שחיטת הקנה שניקבה אחריו הריאה, ובני המעיים שישראל מזמנין עליהם."
  en: "When a pause mid-slaughter disqualifies — ׳a slaughter's duration׳ and ׳an examination's duration׳; cutting the simanim out of order — carcass or tereifa; and slaughter when the windpipe is cut and the lung or innards are then pierced."
