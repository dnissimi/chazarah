title:
  he: "מפת הסוגיא — חולין פ״א"
  en: "Sugya map — Chullin 81"
blurb:
  he: "לר׳ שמעון שחיטה שאינה ראויה אינה שחיטה — ומכאן מי פטור מ׳אותו ואת בנו׳: בקדשים אין מלקות, ובמשנת ׳השוחט ונמצא טריפה׳ הוא פוטר; ופרת חטאת ועגלה ערופה ׳אינן משנה׳."
  en: "For R. Shimon, unfit slaughter is not slaughter — so who is exempt from ‘itself and its offspring’: in sacrifices there are no lashes, and in the Mishna ‘slaughtered and found a tereifa’ he exempts; the red heifer and broken-necked heifer ‘are not part of the Mishna.’"
topic:
