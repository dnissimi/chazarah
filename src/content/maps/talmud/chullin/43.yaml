title:
  he: "מפת הסוגיא — חולין מ״ג"
  en: "Sugya map — Chullin 43"
blurb:
  he: "עולא מונה שמונה מיני טרפות שנאמרו למשה בסיני; ר׳ יוחנן פוסק שמרה שניקבה טרפה ושדי בכזית כבד; הוושט נבדק רק מבפנים, וקוץ שישב בו — אין חוששין; ובתורבץ הוושט נחלקו רב ושמואל — ורבא, שצירף את חומרות שניהם, חויב לשלם את השור."
  en: "Ulla counts eight categories of tereifot stated to Moses at Sinai; Rabbi Yochanan rules a perforated gallbladder a tereifa and an olive-bulk of liver sufficient; the gullet is inspected only from within, and a thorn lodged in it raises no concern; Rav and Shmuel dispute the entrance of the gullet — and Rava, who combined both stringencies, was made to pay for the bull."
topic:
  he: "שמונה מיני טרפות והוושט"
  en: "Eight tereifot and the gullet"
