blurb:
  he: "פתיחת פרק \"השוחט\": כמה סימנים צריך לשחוט בעוף ובבהמה, מניין ששחיטה מן הצוואר, ומדוע די לעוף בסימן אחד — עם דרשת בר קפרא מ\"זאת תורת הבהמה והעוף\"."
  en: "The opening of the chapter \"HaShochet\": how many simanim one cuts in a bird versus an animal, why slaughter must be from the neck, and why a bird needs only one siman — with Bar Kappara's derivation from \"This is the law of the animal and the bird.\""
