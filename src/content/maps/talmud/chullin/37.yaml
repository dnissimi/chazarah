title:
  he: "מפת הסוגיא — חולין ל״ז"
  en: "Sugya map — Chullin 37"
blurb:
  he: "שלוש סוגיות בחולין ל״ז על המסוכנת — בהמה הנוטה למות: משנת סימני הפירכוס המכשירים את שחיטתהּ; דרשה ארוכה המוכיחה שבשרהּ מותר באכילה לאחר שחיטה, שאינה כנבלה ולא כטרפה; והגדרת המסוכנת ומחלוקת רב ושמואל מהו הפירכוס המתיר."
  en: "Three sugyot on Chullin 37 about the mesukkenet — an animal in danger of imminent death: the Mishnah's convulsion-signs that validate its slaughter; a long derivation that its meat is permitted once slaughtered, being neither a carcass nor a tereifa; and the definition of a mesukkenet with the Rav–Shmuel dispute over which convulsion validates the slaughter."
topic:
  he: "שחיטת המסוכנת וסימני הפירכוס"
  en: "Slaughtering a dying animal; signs of life"
