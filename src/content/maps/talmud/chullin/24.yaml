blurb:
  he: "שלושה זוגות של ׳כשר בזה פסול בזה׳ בדף: פרה אדומה מול עגלה ערופה (שחיטה או עריפה), כוהנים מול לוויים (מומים מול שנים), וכלי חרס מול שאר הכלים (אוויר מול גב) — ובכל אחד נדחים ניסיונות קל וחומר מן הכתובים."
  en: "Three ׳fit in one, unfit in the other׳ pairs across the daf: the red heifer vs. the broken-neck heifer (slaughter or neck-breaking), priests vs. Levites (blemishes vs. years), and earthenware vs. other vessels (airspace vs. outer side) — in each, a fortiori inferences are blocked by verses."
