title:
  he: "חולין כ״ד — ניגודי כשרוּת לעבודה וטומאת כלים"
  en: "Chullin 24 — Contrasts of fitness for service, and vessel impurity"
blurb:
  he: "פרק ״השוחט״: סדרת ניגודים בכשרוּת — מה שכשר בפרה אדומה פסול בעגלה ערופה ולהפך, וגיל מכשיר בכהנים אך מום פוסל בלויים; ומשם לטומאת כלים — מה שטהור בכלי חרס טמא בשאר כלים. בכל סוגיה הגמרא מנסה קל וחומר ודוחה אותו בעזרת פסוק או מיעוט."
  en: "Chapter 'HaShochet': a run of contrasts in fitness — what qualifies in the Red Heifer disqualifies in the Broken-Necked Calf and vice versa, and age qualifies priests while a blemish disqualifies Levites; then vessel impurity — what is pure in earthenware is impure in other vessels. Each sugya tries an a-fortiori inference and rejects it with a verse or a limiting word."
