blurb:
  he: "דבר בלוע בגוף אינו מטמא ואינו מיטמא; נלמד מנבלה ובקל וחומר משרשרת מקרים; רבא משיג שהכל שנוי במשנה ומעמיד בשתי טבעות; והעובר — גזירת חכמים שמא יוציא ראשו."
  en: "An item encapsulated in a body neither imparts nor contracts impurity; derived from a carcass and a chain of a fortiori inferences; Rava objects that all is already taught and recasts it as two swallowed rings; and the fetus case rests on a rabbinic decree."
