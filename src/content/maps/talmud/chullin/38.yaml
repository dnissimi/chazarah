title:
  he: "מפת הסוגיא — חולין ל״ח"
  en: "Sugya map — Chullin 38"
blurb:
  he: "ארבע סוגיות בחולין ל״ח. שלוש מימרות נחלקו מתי הפירכוס מכשיר את שחיטת המסוכנת — בסוף השחיטה, אף בתחילתה, או בסופה — וכל אחת מביאה ראיה; רבא פוסק הלכה כברייתא בענייני יד רגל דקה גסה ועוף; משנת השוחט לנכרי ומחלוקת אם סתם מחשבת נכרי לעבודה זרה; והגמרא מבארת את שורש המחלוקת בשני לשונות."
  en: "Four sugyot on Chullin 38. Three statements dispute when a convulsion validates the slaughter of a dying animal — at the end, even at the start, or only at the end — each with a proof; Rava rules the halakha follows a baraita on foreleg, hind leg, small, large and bird; the Mishnah of one who slaughters for a gentile and the dispute whether a gentile's unspecified intent is for idol worship; and the Gemara explains the root of the dispute in two versions."
topic:
