  en: "Fourth-degree impurity in sacrificial food — Rav Yitzḥak on non-sacred food prepared in kodesh purity and the tannaitic dispute; and whether slaughter (not blood) renders flesh susceptible to impurity, down to the derivation from ׳he drinks the blood of the slain.׳"
