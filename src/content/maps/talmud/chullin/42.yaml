  en: "Sugya map — Chullin 42"
blurb:
  he: "פתיחת פרק אלו טרפות: המשנה מונה את הטרפות בבהמה; ריש לקיש מבקש רמז מן התורה לכך שטרפה אינה חיה; תנא דבי רבי ישמעאל מונה שמונה עשרה טרפות שנאמרו למשה מסיני, והגמרא מיישבת את המניין מול בסג״ר ושב שמעתתא — אפיק חדא ועייל חדא."
  en: "The chapter These Are Tereifot opens: the Mishnah lists the tereifot of an animal; Reish Lakish seeks a Torah allusion that a tereifa cannot live; the school of R. Yishmael counts eighteen tereifot stated to Moses at Sinai, and the Gemara reconciles the count against the BeSaGaR cases and the seven amoraic rulings — remove one, insert one."
topic:
