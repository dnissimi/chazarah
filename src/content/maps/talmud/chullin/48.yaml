blurb:
  he: "טריפות הריאה והדבקויות: ריאה הסמוכה לדופן וצמחים שעלו עליה, ריאה שניקבה והדופן סותמתה, ומחט שנמצאה בריאה, בכבד ובמרה — אימתי תולים שניקבה ואימתי דרך הסימפון."
  en: "Tereifot of the lung and its adhesions: a lung attached to the chest wall and cysts that grow on it, a perforated lung sealed by the chest wall, and a needle found in the lung, liver, or gallbladder — when we presume a perforation and when the respiratory route."
