blurb:
  he: "שמוטת ירך בבהמה טריפה, ובעוף נחלקו ארוכות אם כשרה או טריפה; וההלכה: ספק טריפה — בזכר י״ב חודש, בנקבה כל שאינה יולדת."
  en: "A dislocated femur is treifa in an animal; in a bird it is long disputed, and the halakha for a doubtful treifa is twelve months for a male, childlessness for a female."
