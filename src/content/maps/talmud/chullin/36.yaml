title:
  he: "מפת הסוגיא — חולין ל״ו"
  en: "Sugya map — Chullin 36"
blurb:
  he: "שתי סוגיות בחולין ל״ו: השוחט והתיז דם שחיטה על דלעת — מחלוקת רבי ורבי חייא אם הדם מכשיר; וספק ריש לקיש בצריד של מנחות — האם חיבת הקודש מועילה אף למנות ראשון ושני, עד תיקו."
  en: "Two sugyot on Chullin 36: one who splashes slaughter-blood on a gourd — the dispute of Rabbi and Rabbi Ḥiyya whether the blood renders it susceptible; and Reish Lakish's dilemma about dry meal-offering flour — whether regard for sanctity also lets one count first- and second-degree impurity, ending in teiku."
topic:
