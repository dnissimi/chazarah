blurb:
  he: "עיקור סימנים ופסוקת הגרגרת: שמואל מכשיר תורבץ הוושט שניטל רובו, ונחלק רב פפא; וכמה רוב הגרגרת. ומכאן לדיני הוראת חכם — אין חברו רשאי להתיר, וכיצד מותר לחכם לאכול ולקנות מן הטרפה שהתיר."
  en: "Ripped simanim and a cut windpipe: Shmuel permits an animal whose gullet-entrance is mostly detached, and Rav Pappa disputes; and how much of the windpipe counts as a majority. From there to the laws of a Sage's ruling — another may not permit what one prohibited, and how a Sage may eat and buy from the tereifa he permitted."
