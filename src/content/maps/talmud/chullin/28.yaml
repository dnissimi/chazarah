blurb:
  he: "שחיטת עוף בסימן אחד: ״אחד״ — או ושט או קנה (להלכה); הורידין לר׳ יהודה רק בעוף ולא מעכבים; ומחצה על מחצה — לכל הדעות אינו כרוב בשחיטה."
  en: "A bird is slaughtered by cutting one siman — either gullet or windpipe; Rabbi Yehuda's veins apply only to birds and don't invalidate; and a half-cut is not treated as a majority for slaughter."
