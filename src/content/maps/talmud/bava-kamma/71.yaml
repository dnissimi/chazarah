title:
  he: "מפת הסוגיא — בבא קמא ע״א"
  en: "Sugya map — Bava Kamma 71"
blurb:
  he: "מתי השוחט בהמה גנובה באיסור (יום הכיפורים, שבת, עבודה זרה, שור הנסקל) חייב ארבעה וחמשה — לדעת רבי מאיר ולדעת חכמים, ובשחיטה על ידי שליח; וספק ׳חמשה בקר ולא חמשה חצאי בקר׳ בגונב שור של שותפין והודה לאחד מהם."
  en: "When one who slaughters a stolen animal in a forbidden way (Yom Kippur, Shabbat, idolatry, a condemned ox) owes the fourfold/fivefold payment — per Rabbi Meir and per the Rabbis, and where the slaughter is done by an agent; and the ׳five oxen, not five half-oxen׳ dilemma of one who stole a partners' ox and admitted to one partner."
topic:
  he: "טבח באיסור וחמשה חצאי בקר"
  en: "Forbidden slaughter; five half-oxen"
