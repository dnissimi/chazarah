title:
  he: "מפת הסוגיא — בבא קמא ע״א"
  en: "Sugya map — Bava Kamma 71"
blurb:
  he: "מתי גנב ששוחט בהמה גנובה בדרך אסורה (יום כיפור, שבת, עבודה זרה, שור שנידון למיתה) עדיין משלם את הקנס פי ארבעה או חמישה — מה אומר רבי מאיר, מה אומרים חכמים, ומה קורה כששליח שוחט; ועוד שאלה: גנב שגנב שור של שני שותפים והודה לאחד מהם — האם משלם לשני?"
  en: "When a thief who slaughters a stolen animal in a forbidden way (Yom Kippur, Shabbat, idol worship, a death-sentenced ox) still owes the fourfold/fivefold fine — what Rabbi Meir says, what the other Rabbis say, and what happens when an agent does the slaughtering; plus the question of a thief who stole an ox owned by two partners and admitted the theft to one of them — does he still pay the other?"
topic:
  he: "קנס הגנב על שחיטה אסורה"
  en: "A thief's fine for forbidden slaughter"
