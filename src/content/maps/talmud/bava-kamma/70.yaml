  en: "Sugya map — Bava Kamma 70"
blurb:
  he: "מתי כותבים שטר הרשאה לגביית מיטלטלין; המקרים שבהם גנב משלם תשלומי ארבעה וחמישה; דרשת ׳דבר ולא חצי דבר׳ בעדות שני זוגות; וגנב שמכר בשבת — חייב או פטור."
  en: "When an authorization document may be written to collect movable property; the cases in which a thief pays the fourfold or fivefold penalty; the exposition ׳a matter, not half a matter׳ for two pairs of witnesses; and a thief who sold on Shabbat — liable or exempt."
