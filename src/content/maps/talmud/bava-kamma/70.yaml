title:
  he: "מפת הסוגיא — בבא קמא ע׳"
  en: "Sugya map — Bava Kamma 70"
blurb:
  he: "מתי אפשר לתת לחבר נייר שמתיר לו לגבות בשבילך חוב; המקרים שבהם גנב עדיין משלם פי ארבעה או פי חמישה משווי הבהמה; מדוע עדים שכל אחד ראה רק חצי סיפור אפשר (או אי אפשר) לסמוך עליהם; והאם גנב שמכר את הבהמה בשבת עדיין צריך לשלם."
  en: "When you can give a friend a paper to collect a debt for you; the cases where a thief still pays four or five times the value; why witnesses who each saw only half the story can (or can't) be trusted; and whether a thief who sells the animal on Shabbat still has to pay."
topic:
  he: "גביית חוב, קנס הגנב, ועדים"
  en: "Power-of-attorney, the thief's fine, witnesses"
