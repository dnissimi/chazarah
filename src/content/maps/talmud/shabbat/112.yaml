title:
  he: "שבת קי״ב — קשרים שמותר לקשור בשבת"
  en: "Shabbat 112 — Knots one may tie on Shabbat"
blurb:
  he: "הגמרא על משנת ״ואלו קשרים״ — אילו קשרים מותר לקשור בשבת — עוברת סעיף-סעיף (מפתח חלוקה, חוטי סבכה, רצועות מנעל וסנדל, נודות, קדירה), ובאמצע נכנסת לשני דיונים גדולים סביב רצועת סנדל שנפסקה: האם סנדל פגום עדיין ״כלי״, ומה דעת ר' יוחנן והלכה כר' יהודה. נחתם ב״גמרא גמור זמורתא תהא?!״."
  en: "The gemara on the 'these are the knots' Mishnah — which knots may be tied on Shabbat — works clause by clause (garment opening, hairnet threads, shoe and sandal straps, wineskins, a meat pot), with two large digressions on a snapped sandal strap: whether a damaged sandal is still a 'vessel,' R. Yochanan's view, and the ruling like R. Yehuda. It closes with 'shall Torah be studied like mere song?!'"
topic:
  he: "קשרים בשבת וטומאת הסנדל"
  en: "Permitted knots, and the broken sandal as a 'vessel'"
