title:
  he: "מפת הסוגיא — שבת קי״ב"
  en: "Sugya map — Shabbat 112"
blurb:
  he: "המשנה במנה קשרים שאינם קשרי קבע: יש שפטור עליהם אך אסורים, ויש שמותרים לכתחילה; הגמרא מבררת פתח חלוק, סְבָכה, רצועות מנעל וסנדל (וסנדל פגום — כלי, שבת וחליצה), בעיית חזקיה בצירוף נקבים, ונודות וקדירה — עד הלכה כרבי אליעזר בן יעקב."
  en: "The mishna lists knots that are not permanent: some are exempt-but-forbidden, others permitted ab initio; the Gemara works through the robe-opening, hairnet, shoe and sandal straps (and a torn sandal — utensil, Shabbat and ḥalitza), Ḥizkiya's question on combining holes, and jugs and a pot — down to the halakha following Rabbi Eliezer ben Yaakov."
