blurb:
  he: "לוקה הקורע בגדי כהונה או מזיח חושן; הארון — שלוש תיבות מקוננות ושלושה זירים, וזֵר התורה מונח לכל הרוצה ליטול; ובגדי משוח מלחמה — מחלוקת אם משמש בהן או רק נשאל בהם."
  en: "One who tears the vestments or detaches the breastplate is flogged; the Ark was three nested boxes with three crowns, the crown of Torah free for the taking; and the war-priest’s garments — does he serve in them or only consult the Urim?"
