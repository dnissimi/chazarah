blurb:
  he: "רצף דרשות אגדה: הצער שבלב והנחש; ׳הדגה אשר נאכל חינם׳ — דגים או עריות; ומסכת דרשות המָן — שמותיו, ירידתו לפי המעלה, מתנותיו, ותעלומת ׳לחם אבירים׳."
  en: "A run of aggadic homilies: worry and the serpent; the ‘fish we ate for nothing’ in Egypt — fish or forbidden unions; and a tapestry of manna teachings — its names, merit-graded fall, gifts, and the riddle of ‘bread of the mighty.’"
