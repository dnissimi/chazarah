blurb:
  he: "מקור שיעור הביצה לטומאת אוכלין; ׳מלא לוגמיו׳ נמדד לכל אדם לפי עצמו ושיעורי חכמים מסורת מסיני; כל האוכלין מצטרפים לכותבת; והאוכל אכילה גסה פטור — ׳פרט למזיק׳."
  en: "The egg-bulk measure for impure foods is derived from a verse; a cheekful is measured per person and the Sages’ measures are from Sinai; all foods combine to a large date; and one who gorges is exempt — ‘excluding self-harm.’"
