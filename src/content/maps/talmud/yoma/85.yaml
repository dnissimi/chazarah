blurb:
  he: "מפקחין את הגל על הספק להציל נפש, ומכאן לדרשות התנאים מנין שפיקוח נפש דוחה שבת — וההכרעה ׳וחי בהם ולא שימות בהם׳; ומשנת דרכי הכפרה."
  en: "One clears debris even in doubt to save a life; the tanna’im derive that saving a life overrides Shabbat — settled by ‘live by them, not die by them’; then the modes of atonement."
