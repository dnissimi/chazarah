blurb:
  he: "הרואה קרי ביום הכיפורים — עוונותיו מחולין (ו׳סדורין׳ פירושו סדורין לימחל); ובית רבי ישמעאל: ידאג כל השנה, ואם עלתה לו — מובטח לו חיים ועולם הבא. בכך נחתמת מסכת יומא."
  en: "One who sees an emission on Yom Kippur — his sins are forgiven (and “arranged” means arranged to be forgiven); the school of R. Yishmael: he should worry all year, but if he survives he is assured life and the World-to-Come. With this the tractate closes."
