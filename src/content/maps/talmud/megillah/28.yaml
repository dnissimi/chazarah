title:
  he: "מגילה כ״ח — קדושת בית הכנסת שחרב"
  en: "Megillah 28 — The lasting holiness of a synagogue"
blurb:
  he: "קדושת בית הכנסת נשמרת אף כשהוא חרב, ולכן אסור לנהוג בו קלות ראש; מכאן לדיני כבוד בית הכנסת, ולאגדות על כבוד תלמידי חכמים, על המשתמש ב״כתרה של תורה״, ועל המספר הראוי בלוויית העוסק בתורה."
  en: "A synagogue keeps its holiness even in ruin, so it may not be treated lightly; from there to the laws of honoring a synagogue, and aggadot on honoring Torah scholars, on one who exploits 'the crown of Torah,' and on the gathering due one who studies Torah."
