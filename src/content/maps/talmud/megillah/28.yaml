title:
  he: "מפת הסוגיא — מגילה כ״ח"
  en: "Sugya map — Megillah 28"
blurb:
  he: "קדושת בית כנסת שחרב הנשארת עליו ׳כשהן שוממין׳; ברייתא על איסור קלות ראש בבית הכנסת ומה מותר בו; ודברי האמוראים על כתר התורה, על המשמש תלמיד חכם, ועל ביטול תלמוד תורה להוצאת המת ולהכנסת כלה."
  en: "The sanctity of a ruined synagogue that remains ׳even when desolate׳; a baraita on barring frivolity in a synagogue and what is permitted there; and the Amoraim on the crown of Torah, serving a Torah scholar, and interrupting study for a funeral or a bride."
