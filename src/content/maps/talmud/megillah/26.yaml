title:
  he: "מפת הסוגיא — מגילה כ״ו"
  en: "Sugya map — Megillah 26"
blurb:
  he: "מכירת תשמישי קודש — מעלים בקדושה ואין מורידים; קדושת רחוב העיר; בית כנסת של כפר ושל כרך וחלוקת ירושלים; כוח שבעת טובי העיר לחלל את הקדושה; תשמישי מצוה הנזרקים מול תשמישי קדושה הנגנזים; והאם בית כנסת או בית מדרש קדוש יותר."
  en: "Selling sacred items — one ascends in sanctity and never descends; the sanctity of the town square; village vs. city synagogues and the apportioning of Jerusalem; the power of the seven town representatives to deconsecrate; mitzva-articles that are discarded versus sanctity-articles that are interred; and whether a synagogue or a study hall is holier."
topic:
  he: "קדושת בית הכנסת ותשמישי קודש"
  en: "Sanctity of the synagogue and sacred articles"
