title:
  he: "מגילה כ״ו — מכירת קדושת הציבור"
  en: "Megillah 26 — Selling communal sacred property"
blurb:
  he: "מכירת חפצי קדושה של הציבור לפי הכלל ״מעלין בקודש ואין מורידין״ — מן הרחוב ועד ספר תורה: האם לרחוב יש קדושה, מי רשאי למכור בית כנסת (כפר מול כרך, ושבעה טובי העיר), ומה דין תשמישי מצווה ותשמישי קדושה שבלו."
  en: "Selling communal sacred objects under the rule 'one raises in holiness and does not lower' — from the town square to a Torah scroll: whether the square has holiness, who may sell a synagogue (village vs. city, and the seven town elders), and what becomes of worn-out sacred articles."
