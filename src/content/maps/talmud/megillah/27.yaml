title:
  he: "מפת הסוגיא — מגילה כ״ז"
  en: "Sugya map — Megillah 27"
blurb:
  he: "הדף עוסק במכירת ספר תורה ישן וכספי המותר, צדקה שפסקו על בני העיר, מכירת בית הכנסת ודבר שבקדושה, ריבית בבית הכנסת הנמכר על תנאי, השתנה בארבע אמות של תפילה, וסדרת החכמים שנשאלו במה האריכו ימים."
  en: "The daf treats selling an old Torah scroll and surplus funds, charity pledged by townsfolk abroad, selling a synagogue and communal sacred items, interest in a synagogue sold on condition, urinating near a place of prayer, and the series of Sages asked how they merited long life."
