title:
  he: "מגילה כ״ז — כבוד תשמישי קדושה ואריכות ימים"
  en: "Megillah 27 — Honoring sacred articles, and long life"
blurb:
  he: "קדושת תשמישי קודש וכבודם: האם מותר למכור ספר תורה או בית כנסת, ומדוע יש להיזהר בכספם ובכספי צדקה; ובסוף — שרשרת חכמים המסבירים בזכות מה זכו לאריכות ימים, רובם בזכות כבוד בית הכנסת, החברים והתורה."
  en: "The holiness of sacred articles and their honor: whether a Torah scroll or a synagogue may be sold, and why their proceeds (and charity funds) require care; ending with a long chain of sages explaining the merits — mostly honoring the synagogue, their fellows, and Torah — that earned them long life."
