blurb:
  he: "כיצד השכינה עם ישראל בגלות וקדושת בתי הכנסת; דין קפנדריא ועשבים בחורבה; ומשנת ארבע הפרשיות — מתי קוראים שקלים, מהי פרשת שקלים (רב ושמואל), וקריאתה בראשי חודשים אדר וטבת."
  en: "How the Divine Presence accompanies Israel in exile and the sanctity of synagogues; the laws of a shortcut and of grass in a ruin; and the mishna of the four portions — when Shekalim is read, which portion it is (Rav vs. Shmuel), and its reading on the Adar and Tevet New Moons."
