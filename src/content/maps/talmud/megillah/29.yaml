title:
  he: "מגילה כ״ט — השכינה בגלות וארבע הפרשיות"
  en: "Megillah 29 — The Divine Presence in exile, and the Four Portions"
blurb:
  he: "הדף נחלק לשניים: אגדות על השכינה שגלתה עם ישראל ועל קדושת בתי הכנסת, ומ״ראש חודש אדר״ ואילך — משנת ארבע הפרשיות (שקלים, זכור, פרה, החודש): מהי פרשת שקלים, מתי קוראים אותה, וכיצד מחלקים את הקריאה כשראש חודש חל בשבת."
  en: "The folio splits in two: aggadot on the Divine Presence exiled with Israel and the holiness of synagogues; and from 'the New Moon of Adar' onward, the mishna of the Four Portions (Shekalim, Zakhor, Para, HaChodesh) — what 'Shekalim' is, when it is read, and how the reading is divided when the New Moon falls on Shabbat."
